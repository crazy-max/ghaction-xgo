name: xgo-releases-json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'
  push:
    branches:
      - 'master'
  pull_request:

jobs:
  generate:
    uses: crazy-max/.github/.github/workflows/releases-json.yml@d89fe92d808a15e2b2ed5cdb62db7c172c31410d # v1.6.0
    with:
      repository: crazy-max/xgo
      artifact_name: xgo-releases-json
      filename: xgo-releases.json

  open-pr:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    needs:
      - generate
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: xgo-releases-json
          path: .github
      -
        name: Commit changes
        run: |
          git add -A .
      -
        name: Create PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          base: master
          branch: bot/xgo-releases-json
          commit-message: "update .github/xgo-releases.json"
          signoff: true
          delete-branch: true
          title: "Update `.github/xgo-releases.json`"
          body: |
            Update `.github/xgo-releases.json` to keep in sync with [https://github.com/crazy-max/xgo](https://github.com/crazy-max/xgo).
          draft: false
