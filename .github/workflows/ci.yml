name: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  schedule:
    - cron: '0 10 * * *'
  push:
    branches:
      - 'master'
      - 'releases/v*'
    tags:
      - 'v*'
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go_version:
          - "1.20"
          - "1.21"
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Xgo
        uses: ./
        with:
          go_version: ${{ matrix.go_version }}
          targets: windows/amd64,linux/amd64,linux/arm64,linux/arm/v7,darwin/amd64,darwin/arm64
          v: true
          x: false
          ldflags: -s -w
          trimpath: true
          working_dir: ./tests/fixtures/app
      -
        name: Check
        run: |
          tree -f -h ./tests/fixtures/app/build
